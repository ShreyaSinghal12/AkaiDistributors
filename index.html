
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6fb; padding:10px; }
h2 { text-align:center; color:#1a237e; }
.row { display:flex; gap:8px; }
.row input { flex:1; }
input, select { width:100%; padding:12px; margin:6px 0; font-size:16px; box-sizing:border-box; }
button { width:100%; padding:10px; margin-top:6px; font-size:14px; border:none; border-radius:6px; background:#1a73e8; color:white; cursor:pointer; }
#readerBox { display:none; position:relative; margin:8px 0; }
#closeScan { display:block; background:red; color:white; border-radius:6px; width:100%; margin-bottom:4px; }
#scanStatus { display:none; text-align:center; padding:8px; margin:4px 0; border-radius:6px; font-size:14px; font-weight:bold; }
#scanStatus.ready { background:#e8f5e9; color:#2e7d32; }
#scanStatus.error { background:#ffebee; color:#c62828; }
#scanStatus.info  { background:#e3f2fd; color:#1565c0; }
table { width:100%; margin-top:10px; background:white; border-collapse:collapse; }
td,th { padding:10px; text-align:center; border-bottom:1px solid #eee; }
.total { background:#e3f2fd; font-weight:bold; }
#bill { display:none; background:white; padding:20px; }
#cameraBox { display:none; text-align:center; margin:8px 0; }
</style>
</head>
<body>

<h2>AKAI DISTRIBUTORS</h2>

<div class="row">
  <input id="challan" placeholder="Challan No">
  <input type="date" id="date">
</div>

<select id="dealer">
  <option value="">Select SO</option>
  <option>SAMARENDRA CHANDRA SARKA</option>
  <option>AJAY SINGHA</option>
  <option>SOMEN DAS</option>
  <option>CHANDAN DAS</option>
</select>

<input list="dealerList" id="dealerName" placeholder="Select Dealer">
<datalist id="dealerList"></datalist>

<button onclick="openScanner()">Scan Barcode</button>
<button onclick="toggleEdit()">Manual Edit</button>

<div id="scanStatus"></div>

<div id="readerBox">
  <button id="closeScan" onclick="closeScanner()">Close Scanner</button>
  <div id="reader"></div>
</div>

<table>
  <thead>
    <tr>
      <th>Variant</th><th>Qty</th><th>MRP</th>
      <th id="editHead" style="display:none;">Action</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
  <tfoot>
    <tr class="total">
      <td>Total</td><td id="tQty">0</td><td id="tMrp">0</td><td></td>
    </tr>
  </tfoot>
</table>

<button onclick="openCamera()">Confirmation</button>
<div id="cameraBox">
  <video id="video" width="150" height="120" autoplay></video><br>
  <button onclick="capturePhoto()">Click</button>
  <button onclick="retakePhoto()">Retake</button>
  <canvas id="canvas" width="150" height="120" style="display:none;"></canvas>
  <div id="preview"></div>
</div>

<button onclick="download()">Download</button>
<button onclick="submitData()">Submit</button>
<div id="bill"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxN1ueHxR9seDLWBPOQffVkYOFInQpexU6W8-wJIJ-Nl82CtgjSBf6Q-gB-517orI_k/exec";

let items = {};
let scanner = null;
let scanning = false;
let manualMode = false;
let scanLock = false;
let photoData = "";
let stream;

const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function showStatus(msg, type) {
  const el = document.getElementById("scanStatus");
  el.textContent = msg;
  el.className = "scanStatus " + type;
  el.style.display = "block";
  if (type === "ready" || type === "error") {
    setTimeout(() => { el.style.display = "none"; }, 3000);
  }
}

function loadDealers() {
  fetch(API_URL + "?type=dealers")
    .then(res => res.json())
    .then(data => {
      let list = document.getElementById("dealerList");
      list.innerHTML = "";
      data.forEach(d => {
        let opt = document.createElement("option");
        opt.value = d;
        list.appendChild(opt);
      });
    })
    .catch(() => {});
}
window.onload = loadDealers;

function openScanner() {
  document.getElementById("readerBox").style.display = "block";
  if (scanning) return;

  scanner = new Html5Qrcode("reader");

  const config = {
    fps: 15,
    // No qrbox — full frame for better 1D barcode detection
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.QR_CODE
    ],
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true  // uses native BarcodeDetector API on Android Chrome
    }
  };

  scanner.start(
    { facingMode: "environment" },
    config,
    (code) => {
      if (scanLock) return;
      scanLock = true;

      beep.currentTime = 0;
      beep.play();
      showStatus("Scanned: " + code, "info");

      fetch(API_URL + "?uid=" + encodeURIComponent(code))
        .then(r => r.json())
        .then(data => {
          if (!data.variant) {
            showStatus("Not Found: " + code, "error");
            return;
          }
          if (!items[data.variant]) {
            items[data.variant] = { variant: data.variant, qty: 1, mrp: Number(data.mrp) || 0 };
          } else {
            items[data.variant].qty++;
          }
          showStatus("Added: " + data.variant, "ready");
          render();
        })
        .catch(() => showStatus("API error", "error"));

      setTimeout(() => { scanLock = false; }, 2000);
    },
    () => {} // ignore scan errors silently
  ).catch(err => showStatus("Camera error: " + err, "error"));

  scanning = true;
}

function closeScanner() {
  if (scanner && scanning) {
    scanner.stop().then(() => {
      scanning = false;
      scanner = null;
      document.getElementById("readerBox").style.display = "none";
      document.getElementById("scanStatus").style.display = "none";
    }).catch(() => {
      scanning = false;
      scanner = null;
      document.getElementById("readerBox").style.display = "none";
    });
  }
}

function toggleEdit() {
  manualMode = !manualMode;
  document.getElementById("editHead").style.display = manualMode ? "" : "none";
  render();
}

function render() {
  let html = "", tq = 0, tm = 0;
  Object.keys(items).forEach(key => {
    let i = items[key];
    tq += Number(i.qty) || 0;
    tm += (Number(i.qty) || 0) * (Number(i.mrp) || 0);
    html += `<tr>
      <td>${manualMode ? `<input value="${i.variant}">` : i.variant}</td>
      <td>${manualMode ? `<input type="number" value="${i.qty}" onchange="items['${key}'].qty=Number(this.value);render()">` : i.qty}</td>
      <td>${manualMode ? `<input type="number" value="${i.mrp}" onchange="items['${key}'].mrp=Number(this.value);render()">` : i.mrp}</td>
      ${manualMode ? `<td><button onclick="removeItem('${key}')">Remove</button></td>` : `<td></td>`}
    </tr>`;
  });
  if (manualMode) {
    html += `<tr><td colspan="4"><button onclick="addItem()">+ Add Item</button></td></tr>`;
  }
  document.getElementById("tbody").innerHTML = html;
  document.getElementById("tQty").innerText = tq;
  document.getElementById("tMrp").innerText = tm;
}

function addItem() {
  let name = prompt("Enter Variant");
  if (!name) return;
  items[name] = { variant: name, qty: 1, mrp: 0 };
  render();
}

function removeItem(k) {
  delete items[k];
  render();
}

function checkFields() {
  if (!challan.value || !dealer.value || !date.value) {
    alert("Enter Challan, SO & Date");
    return false;
  }
  if (!dealerName.value) { alert("Select Dealer"); return false; }
  if (!photoData) { alert("Capture Confirmation Photo"); return false; }
  return true;
}

function openCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(s => {
      stream = s;
      document.getElementById("cameraBox").style.display = "block";
      document.getElementById("video").srcObject = s;
    });
}

function capturePhoto() {
  let canvas = document.getElementById("canvas");
  let video = document.getElementById("video");
  canvas.getContext("2d").drawImage(video, 0, 0, 150, 120);
  photoData = canvas.toDataURL("image/jpeg");
  stream.getTracks().forEach(t => t.stop());
  video.srcObject = null;
  document.getElementById("preview").innerHTML = `<img src="${photoData}" width="120">`;
}

function retakePhoto() {
  photoData = "";
  document.getElementById("preview").innerHTML = "";
  openCamera();
}

function download() {
  if (!checkFields()) return;
  let tq = 0, tm = 0;
  let time = new Date().toLocaleTimeString("en-IN");
  let html = `<h2 style="text-align:center;">AKAI DISTRIBUTORS</h2>
  <p><b>SO:</b> ${dealer.value}</p><p><b>Dealer:</b> ${dealerName.value}</p>
  <p><b>Date:</b> ${date.value}</p><p><b>Time:</b> ${time}</p><hr>
  <table border="1" style="width:100%;border-collapse:collapse;">
  <tr><th>Variant</th><th>Qty</th><th>MRP</th></tr>`;
  Object.values(items).forEach(i => {
    tq += i.qty; tm += i.qty * i.mrp;
    html += `<tr><td>${i.variant}</td><td>${i.qty}</td><td>${i.mrp}</td></tr>`;
  });
  html += `<tr><td><b>Total</b></td><td><b>${tq}</b></td><td><b>${tm}</b></td></tr></table>`;
  html += `<br><div style="text-align:center;"><img src="${photoData}" width="120"></div>`;
  let bill = document.getElementById("bill");
  bill.innerHTML = html;
  bill.style.display = "block";
  html2canvas(bill).then(canvas => {
    let a = document.createElement("a");
    a.href = canvas.toDataURL();
    a.download = "Bill.jpg";
    a.click();
    bill.style.display = "none";
  });
}

function submitData() {
  if (!checkFields()) return;
  const cleanItems = Object.values(items).map(i => ({
    variant: String(i.variant).trim(),
    qty: Number(i.qty) || 0
  }));
  fetch(API_URL, {
    method: "POST",
    body: new URLSearchParams({
      data: JSON.stringify({
        challan: String(challan.value).trim(),
        so: String(dealer.value).trim(),
        dealer: dealerName.value,
        date: date.value,
        items: cleanItems,
        photo: photoData
      })
    })
  })
  .then(async res => {
    let text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error("Invalid JSON from server"); }
    if (data.status !== "success") throw new Error(data.message || "Server error");
    let temp = {};
    (data.notMatched || []).forEach(i => { temp[i.variant] = i; });
    items = temp;
    render();
    if (!data.notMatched || data.notMatched.length === 0) {
      alert("Data Submitted");
      location.reload();
    } else {
      alert("Some items not matched");
    }
  })
  .catch(err => { alert("Submit Failed: " + err.message); });
}
</script>
</body>
</html>
